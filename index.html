<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Командный список задач — локальный бэкенд (localStorage)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="main-layout">

            <div class="add-task-form">
                <div class="form-block input-wrapper">
                    <input type="text" id="taskInput" placeholder="Введите новую задачу...">
                </div>
                <div class="form-block input-wrapper">
                    <input type="text" id="assigneeInput" placeholder="Кто выполняет?">
                </div>
                <div class="form-block input-wrapper">
                    <input type="date" id="deadlineInput" title="Срок выполнения">
                </div>
                <div class="form-block button-wrapper">
                    <button id="addButton">Добавить</button>
                </div>
            </div>

            <div class="task-list-section">
                <div class="filters">
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="all">Все</button>
                        <button class="filter-btn" data-filter="active">Активные</button>
                        <button class="filter-btn" data-filter="completed">Выполненные</button>
                    </div>
                </div>

                <div class="task-list-container">
                    <ul id="taskList"></ul>
                </div>

                <div class="task-counter">
                    <span id="taskCount">Задач в списке: 0</span>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
